name: Run Tests
on: [push, pull_request]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m venv venv
          ./venv/Scripts/Activate.ps1
          pip install -r requirements.txt
        shell: pwsh
      
      - name: Run tests
        run: |
          ./venv/Scripts/Activate.ps1
          pytest
        shell: pwsh